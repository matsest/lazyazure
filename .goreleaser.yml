# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com

version: 2

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - formats: binary
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    # Don't include README, LICENSE, etc.
    files:
      - none*

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

changelog:
  use: github
  format: "{{ .Message }} ({{ .Hash }})"
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: "^feat[\\w-]*:"
      order: 0
    - title: Improvements
      regexp: "^fix[\\w-]*:"
      order: 1
    - title: Updates
      order: 999

release:
  header: |
    [Full Changelog](https://github.com/matsest/lazyazure/compare/{{ .PreviousTag }}...{{ .Tag }})

  # Create a draft release
  draft: false
  # Prerelease for versions like v0.1.0-alpha1
  prerelease: auto
  # What to include in the release
  mode: keep-existing
  # Footer for the release notes
  footer: |
    ## Installation

    Download the appropriate binary for your platform below.

    ### macOS (Apple Silicon)
    ```bash
    curl -LO https://github.com/matsest/lazyazure/releases/download/{{ .Tag }}/lazyazure_{{ .Version }}_darwin_arm64
    chmod +x lazyazure_{{ .Version }}_darwin_arm64
    mv lazyazure_{{ .Version }}_darwin_arm64 ~/.local/bin/lazyazure
    ```

    ### Linux
    ```bash
    curl -LO https://github.com/matsest/lazyazure/releases/download/{{ .Tag }}/lazyazure_{{ .Version }}_linux_amd64
    chmod +x lazyazure_{{ .Version }}_linux_amd64
    mv lazyazure_{{ .Version }}_linux_amd64 ~/.local/bin/lazyazure
    ```
    
    ### Windows
    Download `lazyazure_{{ .Version }}_windows_amd64.exe` from the assets below and add it to your PATH.
    
    ### Verify Checksum (optional)
    ```bash
    curl -LO https://github.com/matsest/lazyazure/releases/download/{{ .Tag }}/lazyazure_{{ .Version }}_checksums.txt
    sha256sum -c lazyazure_{{ .Version }}_checksums.txt
    ```

# Disable source archives
source:
  enabled: false
